version: '3.7'

services:
  mysql:
    image: mysql
    container_name: mysql_app_1
    restart: always
    tty: true
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: movies_db
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_PASSWORD: 123
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - dbdata:/var/lib/mysql/
      - ./php/my.cnf:/etc/mysql/my.cnf
    networks:
      - app-networks

  app:
    build:
      args:
        user: sammy
        uid: 1000
      context: .
      dockerfile: Dockerfile
    image: php-fpm
    container_name: app_php
    restart: always
    tty: true
    ports:
      - "9000:9000"
    working_dir: /var/www
    environment:
      SERVICES_TAGS: dev
      SERVICES_NAME: app_php
    volumes:
      - ./:/var/www
      - ./php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - app-networks

  webserver:
    image: nginx:alpine
    container_name: project_webserver-app_php
    restart: always
    tty: true
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./:/var/www
      - ./php/conf:/etc/nginx/conf.d
    networks:
      - app-networks

networks:
  app-networks:
    driver: bridge

volumes:
  dbdata:
    driver: local